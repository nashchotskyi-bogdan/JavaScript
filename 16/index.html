<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Homework 16</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
<h2>1.hover area</h2>
<div id="hoverBox">наведи на мене</div>
<hr>
<h2>2.custom context menu</h2>
<div id="textBlock">
    правий клік тут
</div>
<ul id="contextMenu" class="hidden">
    <li data-action="center">вирівняти по центру</li>
    <li data-action="right">вирівняти по правому краю</li>
    <li data-action="left">вирівняти по лівому краю</li>
    <li data-action="hide">приховати</li>
</ul>
<hr>
<h2>3.hover image</h2>
<img id="image" src="https://picsum.photos/300" alt="img">
<hr>
<h2>4.keyboard movement</h2>
<div id="gameArea">
    <div id="player"></div>
</div>
<hr>
<h2>5.menu (M / C + arrows)</h2>
<ul id="menu" class="hidden">
    <li class="active">пункт 1</li>
    <li>пункт 2</li>
    <li>пункт 3</li>
</ul>
<hr>
<h2>6.drag & Drop</h2>
<div id="dragArea">
    <div id="box"></div>
</div>

</body>
</html>
